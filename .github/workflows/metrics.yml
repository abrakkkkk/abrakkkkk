name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Atualiza automaticamente todo dia à meia-noite
  workflow_dispatch: # Permite atualizar manualmente sempre que quiser

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: abrakkkkk
          filename: github-metrics.svg

          # Configurações gerais e de design
          config_timezone: America/Fortaleza
          config_theme: tokyonight

          # Seções base a serem incluídas
          base: header, activity, community, repositories, metadata

          # Plugin de linguagens (ideal para evidenciar SQL, Python, etc.)
          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: percentage
          plugin_languages_limit: 6
